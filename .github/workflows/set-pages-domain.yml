name: set-pages-domain
on:
  workflow_dispatch:
permissions:
  pages: write
  contents: write
jobs:
  set-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Set Pages custom domain to zubair.is-a.dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"cname":"zubair.is-a.dev","https_enforced":true}' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/pages")
          echo "$response"
          http_code=$(echo "$response" | tail -1)
          echo "HTTP status: $http_code"
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Custom domain set successfully"
          else
            echo "Failed to set custom domain"
            exit 1
          fi
